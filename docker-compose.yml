services:
  app:
    build:
      context: .
    image: chemaclass/laravel-feature-flags-dev:latest
    container_name: laravel-feature-flags-demo
    ports:
      - "8000:8000"
    volumes:
      - .:/app
      - composer-cache:/root/.composer/cache
      - workbench-db:/app/workbench/laravel/database
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      DB_CONNECTION: sqlite
    working_dir: /app
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/admin/feature-flags"]
      interval: 5s
      timeout: 3s
      start_period: 20s
      retries: 20

  test:
    build:
      context: .
    image: chemaclass/laravel-feature-flags-dev:latest
    container_name: laravel-feature-flags-test
    profiles: ["tools"]
    volumes:
      - .:/app
      - composer-cache:/root/.composer/cache
    working_dir: /app
    command: ["sh", "-c", "vendor/bin/pest"]

  stan:
    build:
      context: .
    image: chemaclass/laravel-feature-flags-dev:latest
    container_name: laravel-feature-flags-stan
    profiles: ["tools"]
    volumes:
      - .:/app
      - composer-cache:/root/.composer/cache
    working_dir: /app
    command: ["sh", "-c", "vendor/bin/phpstan analyse --memory-limit=512M"]

volumes:
  composer-cache:
  workbench-db:
